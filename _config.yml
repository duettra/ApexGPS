include:
  - .well-known

# Keep docs/*.md free of YAML frontmatter so GitHub's raw-markdown view at
# github.com/duettra/ApexGPS/tree/main/docs renders cleanly. Jekyll derives
# page URLs from these defaults instead of per-file `permalink:` keys.
defaults:
  - scope:
      path: "docs"
    values:
      permalink: /docs/:basename/
  - scope:
      path: "docs/README.md"
    values:
      permalink: /docs/
  - scope:
      path: "de/docs"
    values:
      permalink: /de/docs/:basename/
  - scope:
      path: "de/docs/README.md"
    values:
      permalink: /de/docs/
