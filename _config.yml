include:
  - .well-known
  - assets

# Keep docs/*.md free of YAML frontmatter so GitHub's raw-markdown view at
# github.com/duettra/ApexGPS/tree/main/docs renders cleanly. Jekyll derives
# page URLs and layout from these defaults instead of per-file frontmatter.
defaults:
  - scope:
      path: "docs"
    values:
      permalink: /docs/:basename/
      layout: default
  - scope:
      path: "docs/README.md"
    values:
      permalink: /docs/
  - scope:
      path: "de/docs"
    values:
      permalink: /de/docs/:basename/
      layout: default
  - scope:
      path: "de/docs/README.md"
    values:
      permalink: /de/docs/
  - scope:
      path: "fr/docs"
    values:
      permalink: /fr/docs/:basename/
      layout: default
  - scope:
      path: "fr/docs/README.md"
    values:
      permalink: /fr/docs/
  - scope:
      path: "es/docs"
    values:
      permalink: /es/docs/:basename/
      layout: default
  - scope:
      path: "es/docs/README.md"
    values:
      permalink: /es/docs/
  - scope:
      path: "pl/docs"
    values:
      permalink: /pl/docs/:basename/
      layout: default
  - scope:
      path: "pl/docs/README.md"
    values:
      permalink: /pl/docs/
  - scope:
      path: "ar/docs"
    values:
      permalink: /ar/docs/:basename/
      layout: default
  - scope:
      path: "ar/docs/README.md"
    values:
      permalink: /ar/docs/
